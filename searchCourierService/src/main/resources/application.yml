spring:
  application:
    name: searchCourierService

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/order_management}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  app:
    xa:
      unique-resource-name: orderDb
      server-name: ${DB_HOST:localhost}
      port-number: ${DB_PORT:5432}
      database-name: ${DB_NAME:order_management}
      user: ${DB_USER:postgres}
      password: ${DB_PASSWORD:postgres}
      min-pool-size: 2
      max-pool-size: 10
      borrow-connection-timeout: 30

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  jackson:
    datatype:
      datetime:
        write-dates-as-timestamps: false

  kafka:
    bootstrap-servers: localhost:29092
    listener:
      ack-mode: manual
    consumer:
      group-id: "searchCourier-1"
      auto-offset-reset: earliest
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring:
          deserializer:
            key:
              delegate:
                class: org.apache.kafka.common.serialization.StringDeserializer
            value:
              delegate:
                class: org.springframework.kafka.support.serializer.JsonDeserializer
          json:
            trusted:
              packages: ru.itmo.searchcourierservice.dto
            value:
              default:
                type: ru.itmo.searchcourierservice.dto.SearchCourierRequest
            use:
              type:
                headers: false
      enable-auto-commit: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      transaction-id-prefix: search-courier-tx-
      properties:
        acks: all
        spring.json.add.type.headers: false

server:
  port: 8083

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

topic:
  search-courier: search-courier
  send-notification: send-notification
