spring:
  application:
    name: notificationService

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/order_management}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  app:
    xa:
      unique-resource-name: orderDb
      server-name: ${DB_HOST:localhost}
      port-number: ${DB_PORT:5432}
      database-name: ${DB_NAME:order_management}
      user: ${DB_USER:postgres}
      password: ${DB_PASSWORD:postgres}
      min-pool-size: 2
      max-pool-size: 10
      borrow-connection-timeout: 30



  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  jackson:
    serialization:
      write-dates-as-timestamps: false

  kafka:
    bootstrap-servers: localhost:29092
    consumer:
      group-id: "notification-1"
      auto-offset-reset: earliest
      key-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring:
          deserializer:
            key:
              delegate:
                class: org.apache.kafka.common.serialization.StringDeserializer
            value:
              delegate:
                class: org.springframework.kafka.support.serializer.JsonDeserializer
          json:
            trusted:
              packages: org.moysha.notificationservice.dto
            value:
              default:
                type: org.moysha.notificationservice.dto.NotificationEvent
            use:
              type:
                headers: false

server:
  port: 8081



springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  seller-reaction-timeout-minutes: 10
  courier-arrival-timeout-minutes: 30

  topic:
    send-notification: send-notification