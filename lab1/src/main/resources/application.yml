spring:
  application:
    name: order-management

  mvc:
    async:
      request-timeout: 1800000  # 30 минут для SSE-соединений

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/order_management}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  app:
    xa:
      unique-resource-name: orderDb
      server-name: ${DB_HOST:localhost}
      port-number: ${DB_PORT:5432}
      database-name: ${DB_NAME:order_management}
      user: ${DB_USER:postgres}
      password: ${DB_PASSWORD:postgres}
      min-pool-size: 2
      max-pool-size: 10
      borrow-connection-timeout: 30



  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  seller-reaction-timeout-minutes: 10
  courier-arrival-timeout-minutes: 30
